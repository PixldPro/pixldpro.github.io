<!DOCTYPE html>
<html>
<head>
  <title>Anon Chat</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #chat {
      width: 400px;
      height: 500px;
      background: #1e293b;
      overflow-y: auto;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      background: #334155;
      padding: 8px;
      border-radius: 8px;
      margin: 5px 0;
    }

    .user {
      color: #38bdf8;
      font-size: 12px;
    }

    input {
      width: 300px;
      padding: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      border: none;
      background: #38bdf8;
      color: black;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>💬 Anonymous Chat</h1>
  <div id="userDisplay"></div>

  <div id="chat"></div>

  <div>
    <input id="message" placeholder="Say something..." />
    <button onclick="sendMessage()">Send</button>
  </div>

<script>
  // Generate or load user ID
  let userId = localStorage.getItem("anonID");

  if (!userId) {
    userId = Math.floor(Math.random() * 1000000) + 1;
    localStorage.setItem("anonID", userId);
  }

  document.getElementById("userDisplay").textContent =
    "You are: #" + userId;

  function sendMessage() {
    const input = document.getElementById("message");
    const chat = document.getElementById("chat");

    if (input.value.trim() === "") return;

    const msg = document.createElement("div");
    msg.className = "msg";

    msg.innerHTML = `<div class="user">#${userId}</div>${input.value}`;

    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;

    input.value = "";
  }
</script>
</body>
</html>
