<!DOCTYPE html>
<html>
<head>
  <title>AnonChat Pro</title>
  <style>
    body { margin:0; font-family:Arial; background:#36393f; color:white; }
    .container { display:flex; height:100vh; }
    .sidebar { width:220px; background:#2f3136; display:flex; flex-direction:column; padding:10px; overflow-y:auto; }
    .sidebar button { background:#7289da; color:white; border:none; border-radius:5px; padding:10px; margin-bottom:5px; cursor:pointer; }
    .chatArea { flex:1; display:flex; flex-direction:column; }
    #chat { flex:1; padding:10px; overflow-y:auto; }
    .inputBox { display:flex; padding:10px; background:#40444b; }
    input { flex:1; padding:10px; border-radius:5px; border:none; background:#303339; color:white; }
    button#sendBtn { margin-left:10px; padding:10px; border:none; border-radius:5px; background:#7289da; color:white; cursor:pointer; }
    .msg { margin:8px 0; display:flex; align-items:center; }
    .msg img { width:30px; height:30px; border-radius:50%; margin-right:5px; }
    .user { color:#7289da; font-weight:bold; margin-right:5px; }
    .thread { background:#40444b; color:white; padding:5px; margin-bottom:5px; border-radius:5px; cursor:pointer; }
    .thread.active { background:#5865f2; }
  </style>
</head>
<body>
<div class="container">
  <div class="sidebar" id="threadsList">
    <button onclick="createThreadPrompt()">+ New Thread</button>
  </div>
  <div class="chatArea">
    <div id="chat"></div>
    <div class="inputBox">
      <input id="message" placeholder="Message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded, set, update, get, child } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAdn7b68mCxlF0ckfz4PBbTb5rTEBaNGAE",
  authDomain: "my-awsome-project-75817.firebaseapp.com",
  databaseURL: "https://my-awsome-project-75817-default-rtdb.firebaseio.com",
  projectId: "my-awsome-project-75817",
  storageBucket: "my-awsome-project-75817.firebasestorage.app",
  messagingSenderId: "1016915717130",
  appId: "1:1016915717130:web:2ee35fdc362606238343f3"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ----- User Setup -----
let userId = localStorage.getItem("anonID");
let currentUser = {};

async function initUser() {
  if (!userId) {
    userId = Math.floor(Math.random() * 1000000) + 1;
    localStorage.setItem("anonID", userId);
    const avatars = [
      "https://i.pravatar.cc/50?img=1",
      "https://i.pravatar.cc/50?img=2",
      "https://i.pravatar.cc/50?img=3",
      "https://i.pravatar.cc/50?img=4",
      "https://i.pravatar.cc/50?img=5"
    ];
    const avatar = avatars[Math.floor(Math.random() * avatars.length)];
    await set(ref(db, `users/${userId}`), {
      avatar,
      rank: "New Chatter",
      messagesCount: 0,
      lastMessageTime: 0
    });
  }
  const snapshot = await get(ref(db, `users/${userId}`));
  currentUser = snapshot.val();
}

await initUser();

// ----- Threads -----
let currentThreadId = null;
const threadsList = document.getElementById("threadsList");

async function loadThreads() {
  threadsList.innerHTML = '<button onclick="createThreadPrompt()">+ New Thread</button>';
  const snapshot = await get(ref(db, "threads"));
  if(snapshot.exists()) {
    Object.entries(snapshot.val()).forEach(([id, data]) => {
      const div = document.createElement("div");
      div.className = "thread";
      div.textContent = data.title;
      div.onclick = () => selectThread(id, div);
      threadsList.appendChild(div);
    });
  }
}
loadThreads();

function createThreadPrompt() {
  const title = prompt("Thread title:");
  if(title) {
    const threadId = "thread_" + Date.now();
    set(ref(db, `threads/${threadId}`), { title, creatorId: userId, timestamp: Date.now() });
    loadThreads();
  }
}

function selectThread(threadId, divElement) {
  currentThreadId = threadId;
  document.querySelectorAll(".thread").forEach(el => el.classList.remove("active"));
  divElement.classList.add("active");
  loadMessages();
}

// ----- Messages -----
const chat = document.getElementById("chat");
const input = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");

let messageListener = null;

async function loadMessages() {
  chat.innerHTML = "";
  if(!currentThreadId) return;

  if(messageListener) messageListener(); // remove previous listener

  const messagesRef = ref(db, `messages/${currentThreadId}`);
  messageListener = onChildAdded(messagesRef, snapshot => {
    const data = snapshot.val();
    const msg = document.createElement("div");
    msg.className = "msg";
    msg.innerHTML = `
      <img src="${data.avatar}">
      <span class="user">#${data.user} (${data.rank}):</span>
      <span class="text">${data.text}</span>
    `;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
  });
}

async function sendMessage() {
  if(!currentThreadId) return alert("Select a thread first!");
  if(input.value.trim() === "") return;

  // Spam prevention
  const now = Date.now();
  if(now - currentUser.lastMessageTime < 5000) return alert("Wait 5 seconds between messages");

  // Post message
  const msgRef = ref(db, `messages/${currentThreadId}`);
  push(msgRef, {
    user: userId,
    text: input.value,
    avatar: currentUser.avatar,
    rank: currentUser.rank,
    timestamp: Date.now()
  });

  // Update user data
  currentUser.lastMessageTime = now;
  currentUser.messagesCount += 1;

  // Rank upgrade
  if(currentUser.messagesCount >= 20) currentUser.rank = "Advanced Chatter";
  update(ref(db, `users/${userId}`), currentUser);

  input.value = "";
}

sendBtn.onclick = sendMessage;
input.addEventListener("keypress", e => { if(e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
