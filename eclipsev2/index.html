<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eclipse V2 | GitHub Portal</title>
    <style>
        * { box-sizing: border-box; }

        :root {
            --primary: #238636; /* GitHub Green */
            --primary-hover: #2ea043;
            --bg: #0d1117;
            --card: #161b22;
            --text: #ffffff;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .promo-card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 40px; 
            padding: 50px 30px;
            max-width: 450px;
            width: 92%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .github-icon {
            background: #ffffff;
            color: #000;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 30px;
            font-weight: bold;
        }

        h1 { font-size: 2.2rem; margin: 0 0 10px 0; letter-spacing: -0.5px; }
        p { color: var(--text-dim); margin-bottom: 35px; line-height: 1.5; }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 18px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: 1px solid var(--border);
        }

        /* High Visibility Button */
        .btn-main {
            background-color: var(--primary);
            color: white;
            border: none;
        }

        .btn-main:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .btn-sub {
            background-color: #21262d;
            color: #58a6ff;
        }

        .btn-sub:hover {
            background-color: #30363d;
            border-color: #8b949e;
        }

        .footer-info {
            margin-top: 35px;
            display: flex;
            justify-content: center;
            gap: 15px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .status-dot {
            color: #238636;
            margin-right: 4px;
        }
    </style>
</head>
<body>

    <div class="promo-card">
        <div class="github-icon">G</div>
        <h1>Eclipse V2</h1>
        <p>Your files are hosted on GitHub. Click below to view the repository and download the latest Beta build.</p>
        
        <div class="button-group">
            <a href="https://github.com/PixldPro/eclipsev2-beta-" 
               target="_blank" 
               class="btn btn-main">
               View GitHub Repository
            </a>
            
            <a href="https://www.win-rar.com/download.html" 
               target="_blank" 
               class="btn btn-sub">
               Get WinRAR
            </a>
        </div>

        <div class="footer-info">
            <span><span class="status-dot">●</span> Status: Active</span>
            <span>Version: 2.0-Beta</span>
        </div>
    </div>

</body>
</html>
